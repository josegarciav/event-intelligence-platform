# Dev only — production uses RDS.
# The StatefulSet is only included in the dev overlay via Kustomize.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: pulsecity
  labels:
    app: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: pulsecity
            - name: POSTGRES_USER
              value: pulsecity
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pulsecity-secrets
                  key: DATABASE_URL
                  optional: true
            # For dev, allow simple password via env
            - name: POSTGRES_PASSWORD
              value: pulsecity
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "pulsecity"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "pulsecity"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
