name: "Core Metadata Classification with Pricing"
description: "Determines fundamental event metadata and extracts structured pricing from text."

system_prompt: |
  You are the Pulsecity Expert Curator. You have an elite understanding of urban culture,
  from underground jazz clubs to corporate tech summits.

  Your goal is to classify the event's high-level type, generate semantic tags, and
  extract structured pricing information from any available text.

user_prompt: |
  Analyze the event and provide core classification:
  TITLE: {{ title }}
  DESCRIPTION: {{ description }}

  EXTRACT:
  - event_type: Choose from [concert, art_show, festival, workshop, lecture, meetup, party, sports, exhibition, conference, nightlife, theater, dance, food_beverage, other]
  - event_format: [in_person, virtual, hybrid, streamed]
  - tags: Generate 5-8 highly relevant tags. Include music genres if applicable (e.g., 'Melodic Techno', 'Brunch').
  - pricing: Extract structured pricing if any price info is present; null otherwise.

  LOGIC:
  - If a DJ is mentioned without a 'live' band, it's 'nightlife' or 'party'.
  - Tags should be lowercase and specific, maximum 2 words per tag.
  - Use 'other' for niche events not fitting main categories.
  - For pricing: detect is_free from keywords ("free", "gratis", no price mentioned).
  - Infer currency_code from symbols ($ → USD, £ → GBP, € → EUR) or explicit text.
  - Extract numeric values for minimum_price, maximum_price, early_bird_price, standard_price, vip_price.
  - Copy verbatim price string to price_raw_text if any price text is found.
  - Return null for the entire pricing object if no pricing information is present.

batch_user_prompt: |
  Classify these {{ event_count }} events. Apply the same rules as single-event mode.

  EVENTS:
  {{ events_json }}

  Return a JSON object with an `items` array — exactly {{ event_count }} entries, one per event.
  Each entry must include:
  - source_event_id  (copy exactly from input — required for matching)
  - event_type: one of [concert, art_show, festival, workshop, lecture, meetup, party,
    sports, exhibition, conference, nightlife, theater, dance, food_beverage, other]
  - event_format: one of [in_person, virtual, hybrid, streamed]
  - tags: 5-8 lowercase relevant tags (include music genres where applicable)
  - pricing: object or null

  LOGIC:
  - If a DJ is mentioned without a 'live' band → nightlife or party.
  - Tags should be lowercase and specific.
  - Use 'other' for niche events not fitting main categories.

  PRICING RULES:
  - Set is_free: true if event is free ("free", "gratis", "no charge", $0).
  - Infer currency_code from symbols: $ → USD, £ → GBP, € → EUR, or from explicit mention.
  - Extract numeric prices into the appropriate tier fields:
      minimum_price: lowest advertised ticket price
      maximum_price: highest advertised ticket price
      early_bird_price: discounted advance price
      standard_price: regular admission price
      vip_price: premium/VIP ticket price
  - Copy any price string verbatim to price_raw_text.
  - If no pricing information is present in the event context, set pricing: null.
  - NEVER invent prices; only extract what is explicitly stated.

  Pricing object shape (all fields optional, return null if no pricing info):
  {
    "is_free": true | false | null,
    "currency_code": "USD" | "EUR" | "GBP" | null,
    "minimum_price": <number> | null,
    "maximum_price": <number> | null,
    "early_bird_price": <number> | null,
    "standard_price": <number> | null,
    "vip_price": <number> | null,
    "price_raw_text": "<verbatim price string>" | null
  }
