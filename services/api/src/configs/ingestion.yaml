        source: "description"

    # Custom fields: source-specific context for LLM enrichment
    custom_fields_mapping:
      status: "status"
      online_event: "online_event"
      category_name: "category_name"
      subcategory_name: "subcategory_name"
      format_name: "format_name"
      is_sold_out: "is_sold_out"
      has_available_tickets: "has_available_tickets"
      waitlist_available: "waitlist_available"
      capacity: "capacity"
      organizer_description: "organizer_description"
      organizer_num_upcoming: "organizer_num_upcoming"
      summary: "summary"
      invite_only: "invite_only"
      listed: "listed"
      show_remaining: "show_remaining"
      venue_address2: "venue_address2"

    taxonomy_suggestions:
      default_primary: "1"       # Play & Pure Fun
      default_subcategory: "1.1" # Social & Playful Gatherings

    event_type_rules:
      - match:
          title_contains: ["festival", "fest"]
        type: "festival"
      - match:
          title_contains: ["party", "fiesta", "rave", "club night", "nightlife"]
        type: "party"
      - match:
          title_contains: ["concert", "live music", "gig", "recital", "opera", "live show"]
        type: "concert"
      - match:
          title_contains: ["workshop", "class", "course", "masterclass", "training", "taller"]
        type: "workshop"
      - match:
          title_contains: ["conference", "summit", "symposium", "seminar", "meetup", "networking"]
        type: "conference"
      - match:
          title_contains: ["exhibition", "expo", "fair", "trade show", "museum", "gallery", "art show"]
        type: "exhibition"
      - match:
          title_contains: ["comedy", "stand-up", "standup", "humor", "improv"]
