  # =========================================================================
  # MEETUP - GraphQL API (community events, tech meetups, social gatherings)
  # =========================================================================
  # Auth: OAuth2 Bearer token — set MEETUP_API_KEY in .env
  # Meetup v3 uses cursor-based pagination; the pipeline runs one fetch
  # per date window (the sliding window strategy handles high-density days).
  # Area lookup uses lat/lon stored in defaults.city_coords (not integer IDs).
  # =========================================================================
  meetup:
    enabled: false
    pipeline_type: "api"

    connection:
      endpoint: "https://api.meetup.com/gql"
      protocol: "graphql"
      timeout_seconds: 30
      headers:
        Authorization: "Bearer ${MEETUP_API_KEY}"
        Content-Type: "application/json"

    max_retries: 3
    rate_limit_per_second: 2.0

    query:
      template: |
        query GetUpcomingEvents($lat: Float!, $lon: Float!, $radius: Float, $startDateRange: ZonedDateTime, $endDateRange: ZonedDateTime, $first: Int) {
          keywordSearch(
            filter: {
              lat: $lat
              lon: $lon
              radius: $radius
              startDateRange: $startDateRange
              endDateRange: $endDateRange
              source: EVENTS
            }
            input: {
              first: $first
            }
          ) {
            count
            edges {
              node {
                result {
                  ... on Event {
                    id
                    title
                    description
                    shortDescription
                    dateTime
                    endTime
                    duration
                    eventUrl
                    isOnline
                    going
                    waiting
                    maxTickets
                    venue {
                      id
                      name
                      address
                      city
                      state
                      country
                      lat
                      lng
                      postalCode
                    }
                    group {
                      id
                      name
                      urlname
                      city
                      state
                      country
                      timezone
                      membersCount
                      description
                      organizer {
                        name
                      }
                    }
                    images {
                      baseUrl
                    }
                    feeSettings {
                      amount
                      currency
                      type
                      label
                    }
                    topics {
                      name
                    }
                  }
                }
              }
            }
          }
        }
      variables:
        lat: "{{lat}}"
        lon: "{{lon}}"
        radius: "{{radius}}"
        startDateRange: "{{date_from_iso}}"
        endDateRange: "{{date_to_iso}}"
        first: "{{page_size}}"
      response_path: "data.keywordSearch.edges"
      total_results_path: "data.keywordSearch.count"

    pagination:
      type: "page_number"
      max_pages: 1              # One call per sliding window; density handled by window shrink
      default_page_size: 50
      start_page: 1

    # Field mappings — paths relative to each edge object
    field_mappings:
      source_event_id:    "node.result.id"
      title:              "node.result.title"
      description:        "node.result.description"
      short_description:  "node.result.shortDescription"
      start_time:         "node.result.dateTime"
      end_time:           "node.result.endTime"
      duration:           "node.result.duration"          # milliseconds
      content_url:        "node.result.eventUrl"
      is_online:          "node.result.isOnline"
      going:              "node.result.going"
      waiting:            "node.result.waiting"
      max_tickets:        "node.result.maxTickets"
      # Venue
      venue_id:           "node.result.venue.id"
      venue_name:         "node.result.venue.name"
      venue_address:      "node.result.venue.address"
      city:               "node.result.venue.city"
      state_or_region:    "node.result.venue.state"
      country_code:       "node.result.venue.country"
      latitude:           "node.result.venue.lat"
      longitude:          "node.result.venue.lng"
      postal_code:        "node.result.venue.postalCode"
      # Group (organizer)
      group_id:           "node.result.group.id"
      group_name:         "node.result.group.name"
      group_urlname:      "node.result.group.urlname"
      group_city:         "node.result.group.city"
      group_timezone:     "node.result.group.timezone"
      group_members:      "node.result.group.membersCount"
      group_description:  "node.result.group.description"
      organizer_name:     "node.result.group.organizer.name"
      # Media
      image_url_raw:      "node.result.images[0].baseUrl"
      # Fee
      cost_min:           "node.result.feeSettings.amount"
      cost_currency:      "node.result.feeSettings.currency"
      fee_type:           "node.result.feeSettings.type"   # cash | paypal | wepay | no_payment
      fee_label:          "node.result.feeSettings.label"
      # Topics (Meetup's tagging system — good for LLM context)
      topics:             "node.result.topics[*].name"

    transformations:
      source_url:
        type: "template"
        template: "{{content_url}}"
        when: "content_url"
      image_url:
        type: "template"
        template: "{{image_url_raw}}"
        when: "image_url_raw"
      country_code:
        type: "uppercase"
        source: "country_code"
      description:
        type: "strip_html"
        source: "description"

    # Custom fields: source-specific context for LLM enrichment
    custom_fields_mapping:
      group_name: "group_name"
      group_urlname: "group_urlname"
      group_members: "group_members"
      group_description: "group_description"
      going: "going"
      waiting: "waiting"
      max_tickets: "max_tickets"
      is_online: "is_online"
      fee_type: "fee_type"
      fee_label: "fee_label"
      topics: "topics"
      short_description: "short_description"
      duration_ms: "duration"

    taxonomy_suggestions:
      default_primary: "1"       # Play & Pure Fun
      default_subcategory: "1.1" # Social & Playful Gatherings

    event_type_rules:
      - match:
          title_contains: ["conference", "summit", "symposium", "seminar", "networking"]
        type: "conference"
      - match:
          title_contains: ["workshop", "class", "course", "masterclass", "training", "bootcamp"]
        type: "workshop"
      - match:
          title_contains: ["concert", "live music", "gig", "recital"]
        type: "concert"
      - match:
          title_contains: ["festival", "fest"]
        type: "festival"
      - match:
          title_contains: ["party", "fiesta", "social", "mixer", "happy hour"]
        type: "party"
      - match:
          title_contains: ["exhibition", "expo", "fair", "museum", "gallery"]
        type: "exhibition"
      - match:
          title_contains: ["hike", "hiking", "walk", "run", "sport", "fitness", "yoga"]
        type: "sports"
      - default: true
        type: "meetup"

    defaults:
      page_size: 50
      days_ahead: 7
      radius: 25               # search radius in miles
      # For Meetup, areas map city_name -> sentinel 0.
      # Actual lat/lon is read from city_coords and injected as query variables.
      areas:
        Barcelona: 0
        Madrid: 0
      city_coords:
        Barcelona:
          lat: 41.3851
          lon: 2.1734
        Madrid:
          lat: 40.4168
          lon: -3.7038
      location:
        country_code: "ES"
        timezone: "Europe/Madrid"
        currency: "EUR"

    validation:
      required_fields: ["title", "source_event_id"]
      future_events_only: true

    enrichment:
      geocoding: false
      compressed_html:
        enabled: false

    schedule:
      type: "cron"
      cron_expression: "0 */6 * * *"
      enabled: false

  # FEVER has no public API — use scraper_adapter with a custom pipeline config when adding.

# =========================================================================
# GLOBAL SETTINGS
# =========================================================================
global:
  # Primary storage (DB persistence — only used by LLM enrichment layer)
  storage:
    type: "postgresql"
    url: "${DATABASE_URL}"
    pool_size: 10
    max_overflow: 20

  # Batch storage: ingestion output written here; LLM enrichment reads from here
  batch_storage:
    enabled: true
    output_dir: "data/batches"   # relative to project root
    format: "jsonl"              # jsonl | parquet

  # Logging
  logging:
    level: "INFO"
    format: "json"
    file: "logs/ingestion.log"

  # Data quality
  quality_thresholds:
    minimum_quality_score: 0.3
    timezone_confidence: 0.7

  # Deduplication
  deduplication:
    enabled: true
    strategy: "exact"  # exact | fuzzy | metadata | composite

  # Enrichment services (optional)
  enrichment_services:
    geocoding:
      provider: "google"
      api_key: "${GEOCODING_API_KEY}"
      cache_ttl_hours: 720

    image_validation:
      timeout: 5
      check_accessibility: true

  # Monitoring & alerts (observability)
  observability:
    sentry_enabled: false
    sentry_dsn: "${SENTRY_DSN}"

    slack_enabled: false
    slack_webhook: "${SLACK_WEBHOOK}"

    alert_on:
      - "pipeline_failure"
      - "data_quality_breach"
      - "deduplication_rate_high"
      - "ingestion_delay"
      - "missing_required_fields"
      - "low_quality_score"
      - "api_error_rate_high"
